# bindings
bind-key r source-file ~/.tmux.conf
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# settings
set -g default-terminal "tmux-256color"
set -g terminal-overrides ',alacritty:RGB'
set -g set-clipboard on
set -g allow-rename off
set -g automatic-rename off
set -g @catppuccin_window_text "#{?#{==:#W,zsh},#{b:pane_current_path},#W}"
set -g @catppuccin_window_current_text "#{?#{==:#W,zsh},#{b:pane_current_path},#W}"
set -g history-limit 100000
set -g escape-time 0
set -g mouse off
set -g mode-keys vi
set -g focus-events on

# vim-like pane switching
bind -r ^ last-window
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

bind H resize-pane -L
bind J resize-pane -D
bind K resize-pane -U
bind L resize-pane -R

bind e setw synchronize-panes on
bind E setw synchronize-panes off

# plugins
set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @plugin 'tmux-plugins/tpm'

# catppuccin v2: status modules are set via status-right directly
set -g status-right-length 100
set -g status-right "#{E:@catppuccin_status_application}#{E:@catppuccin_status_session}"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
